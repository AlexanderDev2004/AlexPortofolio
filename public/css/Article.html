<!DOCTYPE html>
<html lang="en">

          <li>
            <a

          <li>
            <a

      <!-- Hamburger Menu for Mobile -->

        <button id="hamburger-icon" class="text-white p-2 focus:outline-none">
          <svg

        <!-- Mobile Menu (hidden by default) -->
        <div id="mobile-menu" class="hidden bg-blue-700 py-2">
          <ul class="flex flex-col space-y-2 items-center">
            <li>
              <a

            <li>

      </div>
  
      <script>
        // JavaScript to toggle the visibility of the mobile menu
        const hamburgerIcon = document.getElementById("hamburger-icon");
        const mobileMenu = document.getElementById("mobile-menu");
  
        hamburgerIcon.addEventListener("click", () => {
          mobileMenu.classList.toggle("hidden");
        });
      </script>

<div class="container mx-auto mt-8 text-center">
    <h1 class="text-3xl font-bold mb-4 text-gray-800">All Articles</h1>

    <!-- Search Bar -->
    <div class="mb-8 max-w-md mx-auto">
        <input
            id="searchInput"
            type="text"
            placeholder="Search by Tag or Title"
            class="p-3 border border-gray-300 rounded-md w-full focus:outline-none focus:ring focus:border-blue-300"
        />
        <button
            onclick="searchText()"
            class="mt-2 px-4 py-2 bg-blue-500 text-white rounded-md hover:bg-blue-600 focus:outline-none focus:ring focus:border-blue-300"
        >
            Search
        </button>
    </div>

    <!-- Card Component -->
    <div id="cardContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <!-- Example Card 1 -->
        <div class="bg-white p-6 rounded-md shadow-md transition-transform transform hover:scale-105 cursor-pointer"
             onclick="viewCard('Card Title 1', 'Lorem ipsum dolor sit amet, consectetur adipiscing elit.', ['Tag A', 'Tag B'])">
            <h2 class="text-xl font-bold mb-4 text-gray-800">Card Title 1</h2>
            <p class="text-gray-600 mb-4">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
            <div class="flex items-center space-x-2 mb-4">
                <span class="bg-blue-500 text-white px-3 py-1 rounded-md text-sm">Tag A</span>
                <span class="bg-green-500 text-white px-3 py-1 rounded-md text-sm">Tag B</span>
            </div>
            <a href="#" class="text-blue-500 hover:underline">Read More</a>
        </div>

        <!-- Example Card 2 -->
        <div class="bg-white p-6 rounded-md shadow-md transition-transform transform hover:scale-105 cursor-pointer"
             onclick="viewCard('Card Title 2', 'Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.', ['Tag C', 'Tag D'])">
            <h2 class="text-xl font-bold mb-4 text-gray-800">Card Title 2</h2>
            <p class="text-gray-600 mb-4">Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
            <div class="flex items-center space-x-2 mb-4">
                <span class="bg-red-500 text-white px-3 py-1 rounded-md text-sm">Tag C</span>
                <span class="bg-yellow-500 text-white px-3 py-1 rounded-md text-sm">Tag D</span>
            </div>
            <a href="#" class="text-blue-500 hover:underline">Read More</a>
        </div>

        <!-- Add more cards as needed -->

    </div>
</div>

<script>
    function searchText() {
        // Get the search input value
        var searchInput = document.getElementById("searchInput").value.toLowerCase();

        // Get all card containers
        var cardContainers = document.querySelectorAll(".bg-white");

        // Loop through each card
        cardContainers.forEach(function (card) {
            var cardText = card.innerText.toLowerCase();

            // If the card text contains the search input, show the card; otherwise, hide it
            if (cardText.includes(searchInput)) {
                card.style.display = "block";
            } else {
                card.style.display = "none";
            }
        });
    }

    function viewCard(title, content, tags) {
        alert("Card Title: " + title + "\nContent: " + content + "\nTags: " + tags.join(", "));
        // Add your custom logic for viewing the full card here
    }
</script>
</body>
</html>
