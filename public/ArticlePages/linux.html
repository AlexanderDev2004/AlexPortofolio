<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>
    <link rel="stylesheet" href="/public/css/output.css" />
    <link href="/public/img/iconAlex.jpeg" rel="icon Alexander" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta17/dist/css/tabler.min.css"
    />
  </head>

  <body class="bg-gray-700">
    <!-- Navbar -->
    <div class="mt-0 bg-blue-700 py-2 hidden md:block">
      <ul class="flex space-x-4 mx-8 justify-center border-solid border-3">
        <li>
          <a
            href="/public/css/index.html"
            class="text-white hover:bg-blue-800 focus:ring-2 focus:ring-blue-300 font-medium rounded-lg text-sm px-2 py-2.5 me-2 mb-2 dark:hover:bg-blue-700 focus:outline-none dark:focus:ring-blue-800 transition-all"
            >Home</a
          >
        </li>
        <li>
          <a
            href="/public/css/Project.html"
            class="text-white hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-3 py-2.5 me-2 mb-2 dark:hover:bg-blue-700 focus:outline-none dark:focus:ring-blue-800 transition-all"
            >Project</a
          >
        </li>
        <li>
          <a
            href="/public/css/About.html"
            class="text-white hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-2 py-2.5 me-2 mb-2 dark:hover:bg-blue-700 focus:outline-none dark:focus:ring-blue-800 transition-all"
            >About</a
          >
        </li>
        <li>
          <a
            href="/public/css/Article.html"
            class="text-white hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-2 py-2.5 me-2 mb-2 dark:hover:bg-blue-700 focus:outline-none dark:focus:ring-blue-800 transition-all"
            >Article</a
          >
        </li>
      </ul>
    </div>

    <!-- Hamburger Menu for Mobile -->
    <div class="md:hidden bg-blue-700">
      <button id="hamburger-icon" class="text-white p-2 focus:outline-none">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          class="h-6 w-6"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16m-7 6h7"
          ></path>
        </svg>
      </button>
      <!-- Mobile Menu (hidden by default) -->
      <div id="mobile-menu" class="hidden bg-blue-700 py-2">
        <ul class="flex flex-col space-y-2 items-center">
          <li>
            <a
              href="/public/css/index.html"
              class="text-white hover:bg-blue-800 font-medium rounded-lg text-sm px-2 py-2.5 dark:hover:bg-blue-700 transition-all"
              >Home</a
            >
          </li>
          <li>
            <a
              href="/public/css/Project.html"
              class="text-white hover:bg-blue-800 font-medium rounded-lg text-sm px-2 py-2.5 dark:hover:bg-blue-700 transition-all"
              >Project</a
            >
          </li>
          <li>
            <a
              href="/public/css/About.html"
              class="text-white hover:bg-blue-800 font-medium rounded-lg text-sm px-2 py-2.5 dark:hover:bg-blue-700 transition-all"
              >About</a
            >
          </li>
          <li>
            <a
              href="/public/css/Article.html"
              class="text-white hover:bg-blue-800 font-medium rounded-lg text-sm px-2 py-2.5 dark:hover:bg-blue-700 transition-all"
              >Article</a
            >
          </li>
        </ul>
      </div>
    </div>

    <script>
      // JavaScript to toggle the visibility of the mobile menu
      const hamburgerIcon = document.getElementById("hamburger-icon");
      const mobileMenu = document.getElementById("mobile-menu");

      hamburgerIcon.addEventListener("click", () => {
        mobileMenu.classList.toggle("hidden");
      });
    </script>

    <div class="judul">
      <div class="text-center py-2 m-1 font-medium">Linux ubuntu 11 basics</div>
      <div class="tanggal">
        <svg 
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-calendar-days"
        >
          <rect width="18" height="18" x="3" y="4" rx="2" ry="2" />
          <line x1="16" x2="16" y1="2" y2="6" />
          <line x1="8" x2="8" y1="2" y2="6" />
          <line x1="3" x2="21" y1="10" y2="10" />
          <path d="M8 14h.01" />
          <path d="M12 14h.01" />
          <path d="M16 14h.01" />
          <path d="M8 18h.01" />
          <path d="M12 18h.01" />
          <path d="M16 18h.01" />
        </svg>
        <p class="text-center py-1 m-0 font-medium">1 jan 2024</p>
      </div>
    </div>
